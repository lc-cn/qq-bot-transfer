# 生产：仅应用容器，数据库使用 Supabase（或其它托管 Postgres）
# 1Panel：容器 → 编排 → 选择本文件，工作目录填项目路径，配置 .env 或面板环境变量
# 命令行：docker compose -f docker-compose.prod.yml up -d --build

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
