# 生产：使用 GitHub Actions 构建并推送到 GHCR 的镜像（服务器上 pull，不在 VPS 编译）
# 部署：APP_IMAGE=ghcr.io/<owner>/<repo>:main docker compose -f docker-compose.ghcr.yml up -d

services:
  app:
    image: ${APP_IMAGE:?set APP_IMAGE e.g. ghcr.io/owner/qq-bot-transfer:main}
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
